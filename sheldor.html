<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Based on https://webtips.dev/add-line-numbers-to-html-textarea?utm_content=cmp-true -->
    <link rel="stylesheet" href="SheldorStyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <title>Sheldor - v1</title>
</head>

<body>

    <div class="container">
        <h1 id="heading">Project Sheldor</h1>

        <div class="settings">
            <input placeholder="@Params" id="inputparams">
            <button type="button" class="btn btn-success btn-sm" id="runbutton">Run</button>
        </div>

        <div class="editorwindow">
            <div class="linenumbers">
                <span></span>
            </div>
            <textarea id="ta"></textarea>
        </div>

        <div class="output">
            <p>...</p>
        </div>
    </div>
    <script src="SheldorScript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
        crossorigin="anonymous"></script>
</body>

</html>
